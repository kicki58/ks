blank_issues_enabled: true

issue_templates:
  - name: "🐛 Bug Report"
    description: "Rapportera ett bug i systemet"
    title: "[Bug]: "
    labels: ["bug"]
    body: "./ISSUE_TEMPLATE/bug_report.yml"

  - name: "✨ Feature Request"
    description: "Föreslå en ny funktion eller förbättring"
    title: "[Feature]: "
    labels: ["enhancement"]
    body: "./ISSUE_TEMPLATE/feature_request.md"
